{% load static %}
<!DOCTYPE html>
<html lang="en">






<style>/* 1. Ensure your header is fixed to the top */
header {
    position: fixed; 
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000; /* Keeps it above the list */
}

/* 2. Base padding for Mobile screens */
#content {
    /* Adjust this to match your mobile header's exact height */
    padding-top: 0px; 
}

/* 3. Larger padding for Desktop screens */
@media (min-width: 768px) {
    #content {
        /* The desktop header in your image looks quite tall. 
           Increase this pixel value until the first row fully clears the header. */
        padding-top: 0px; 
    }
}</style>






<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'styles_ops_product.css' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}">
</head>
<body>
  <header>
    <div class="icons">
      <div class="add_product">
        <a href="{% url 'customers:customer_create' %}" class="add_prod"><img src="{% static 'plus_icon.png' %}" alt="addproduct"></a>
      </div>
      <div class="customer">
        <div class="dot">
          <img src="{% static 'dot_icon.png' %}" alt="product_indicator">
        </div>
        <div class="icon_img">
          <a href="{% url 'customers:customer_list' %}">
            <img src="{% static 'customer_icon.png' %}" alt="customer_list" >
          </a>
        </div>
      </div> 
      <div class="product">
        <div class="dot">
          <img src="{% static 'dot_b_icon.png' %}" alt="product_indicator">
        </div>
        <div class="icon_img">
          <a href="{% url 'products:product_list' %}">
            <img src="{% static 'product_icon.png' %}" alt="product_list" >
          </a>
        </div>
      </div>
      <div class="orders">
        <div class="dot">
          <img src="{% static 'dot_b_icon.png' %}" alt="product_indicator">
        </div>
        <div class="icon_img">
          <a href="{% url 'orders:order_list' %}">
            <img src="{% static 'order_icon.png' %}" alt="order_list" >
          </a>
        </div>
      </div>
      <div class="logout">
        <form class="logout-link" action="{% url 'accounts:logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="icon-button">
                <img src="{% static 'logout_icon.png' %}"  alt="Logout">
            </button>
        </form>
      </div>
    </div>
  </header>

  <div id="content">  
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
